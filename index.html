<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser extension manager UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">


</head>

<body>
    <header>
        <img src="assets/images/logo.svg" alt="logo" class="logo">
        <button type="button" class="button-switch">
            <img src="assets/images/icon-sun.svg" alt="icon-sun" class="button-image">
        </button>
    </header>

    <div class="extensions">
        <p class="extensions-block-big-text">Extensions List</p>
        <div class="switch-block">
            <span class="switch-element all onn">All</span>
            <span class="switch-element active">Active</span>
            <span class="switch-element inactive">Inactive</span>
            </div>
        </div>

    <div class="grid-container"></div>

    <script src="script.js"></script>
</body>

</html>
